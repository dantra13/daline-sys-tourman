name: daline-sys

services:
  postgres:
    image: postgres:18-alpine
    container_name: daline-postgres
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-sport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?password is required}
      POSTGRES_DB:       ${POSTGRES_DB:-sport}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Mount the parent dir (not /data) because postgres:18+ uses PGDATA=/var/lib/postgresql/<MAJOR>/docker.
      # Parent mount is upgrade-friendly across major versions.
      - postgres-data:/var/lib/postgresql
      - ./apps/api/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sport} -d ${POSTGRES_DB:-sport}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    profiles: ["api"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: daline-api
    environment:
      ASPNETCORE_URLS:                "http://+:8080"
      ASPNETCORE_ENVIRONMENT:         "Production"
      ConnectionStrings__Postgres:    "Host=postgres;Port=5432;Database=${POSTGRES_DB:-sport};Username=${POSTGRES_USER:-sport};Password=${POSTGRES_PASSWORD}"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
